# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Unified Music Library Across Servers
    description                           : Yuzic connects to Navidrome, Jellyfin, and other subsonic servers, merging albums, artists, playlists, and tracks into a single library.
    fontawesome_icon_name                 : folder-tree
    
  - title                                 : Offline & Download Support
    description                           : Easily download albums and playlists for later.
    fontawesome_icon_name                 : download

  - title                                 : Customizable UI & Layout
    description                           : Users can control the main view, column count, theme color, and more.
    fontawesome_icon_name                 : paint-roller

  - title                                 : A pretty UI
    description                           : Yuzic is designed to be clean and minimal. Simplicity is key.
    fontawesome_icon_name                 : mobile

  - title                                 : Search & Browsing
    description                           : Quickly find songs, albums, artists, or playlists, even in large libraries.
    fontawesome_icon_name                 : list
  
  - title                                 : Text-to-Music
    description                           : Type out what kind of music you would like to listen to, and Yuzic has you covered.
    fontawesome_icon_name                 : font

  - title                                 : Privacy-First by Design
    description                           : No ads, no tracking by default, no data selling.
    fontawesome_icon_name                 : lock

  - title                                 : Fast, Reliable Playback
    description                           : Music starts (almost) instantly, keeps playing in the background, and works smoothly with lock-screen and media controls.
    fontawesome_icon_name                 : play

  - title                                 : Plugins
    description                           : Connect to other services to expand the capabilities of the app.
    fontawesome_icon_name                 : plug



